services:
  postgres:
    image: postgres:16-alpine
    container_name: tvcask-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tvcask
    volumes:
      - tvcask-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tvcask"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tvcask-postgres:
